name: Backend CI and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Create CI .env for docker compose validation
        run: |
          cat > .env <<'EOF_ENV'
          DB_PASSWORD=ci_password
          DB_NAME=frontefolio
          DB_HOST=mysql
          DB_PORT=3306
          DB_USER=root
          JWT_SECRET=ci_secret
          JWT_EXPIRES_IN=7d
          VALID_CARDS=4111111111111111
          FRONTEND_CUSTOMER_URL=http://localhost:5173
          FRONTEND_ADMIN_URL=http://localhost:5173
          EOF_ENV

      - run: docker compose config

  deploy:
    runs-on: ubuntu-latest
    needs: ci
    environment: ec2
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          HOST="${{ secrets.VPS_HOST }}"
          HOST="${HOST#http://}"
          HOST="${HOST#https://}"
          HOST="${HOST%%/*}"
          echo "VPS_HOST_NORMALIZED=${HOST}" >> "$GITHUB_ENV"
          ssh-keyscan -T 15 -H "${HOST}" >> ~/.ssh/known_hosts || {
            echo "::error::Could not reach ${HOST}:22. Check that VPS_HOST is only a host/IP and that the EC2 Security Group allows SSH from GitHub Actions runners."
            exit 1
          }

      - name: Sync backend to EC2
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='node_modules' \
            ./ ${{ secrets.VPS_USER }}@${VPS_HOST_NORMALIZED}:/opt/frontefolio/backend/

      - name: Write backend .env, migrate, seed, build and restart
        uses: appleboy/ssh-action@v1
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ secrets.JWT_EXPIRES_IN }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          VALID_CARDS: ${{ secrets.VALID_CARDS }}
          FRONTEND_CUSTOMER_URL: ${{ secrets.FRONTEND_CUSTOMER_URL }}
          FRONTEND_ADMIN_URL: ${{ secrets.FRONTEND_ADMIN_URL }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 20m
          envs: JWT_SECRET,JWT_EXPIRES_IN,DB_PASSWORD,VALID_CARDS,FRONTEND_CUSTOMER_URL,FRONTEND_ADMIN_URL
          script: |
            set -e
            cd /opt/frontefolio/backend
            cat > .env <<EOF_ENV
            PORT=3000
            NODE_ENV=production
            JWT_SECRET=${JWT_SECRET}
            JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
            DB_HOST=mysql
            DB_PORT=3306
            DB_NAME=frontefolio
            DB_USER=root
            DB_PASSWORD=${DB_PASSWORD}
            VALID_CARDS=${VALID_CARDS}
            FRONTEND_CUSTOMER_URL=${FRONTEND_CUSTOMER_URL}
            FRONTEND_ADMIN_URL=${FRONTEND_ADMIN_URL}
            AUTH_SERVICE_URL=http://auth-service:3001
            USER_SERVICE_URL=http://user-service:3002
            CATALOG_SERVICE_URL=http://catalog-service:3003
            ORDER_SERVICE_URL=http://order-service:3004
            PAYMENT_SERVICE_URL=http://payment-service:3005
            LOGISTICS_SERVICE_URL=http://logistics-service:3006
            CHAT_SERVICE_URL=http://chat-service:3007
            EOF_ENV

            npm install --quiet

            echo "Starting local Docker MySQL if needed..."
            docker compose --profile local up -d mysql

            echo "Waiting for MySQL..."
            READY_COUNT=0
            for i in $(seq 1 90); do
              if docker compose --profile local exec -T mysql mysql -h localhost -u root -p"${DB_PASSWORD}" -e "SELECT 1" >/dev/null 2>&1; then
                READY_COUNT=$((READY_COUNT + 1))
                if [ "${READY_COUNT}" -ge 3 ]; then
                  break
                fi
              else
                READY_COUNT=0
              fi
              if [ "${i}" -eq 90 ]; then
                echo "MySQL did not become healthy in time."
                docker compose --profile local logs mysql
                exit 1
              fi
              sleep 2
            done

            echo "Running migrations and seed..."
            for i in $(seq 1 5); do
              if DB_HOST=127.0.0.1 node db/migrate.js && DB_HOST=127.0.0.1 node db/seed.js; then
                break
              fi
              if [ "${i}" -eq 5 ]; then
                echo "Migrations/seed failed after retries."
                docker compose --profile local logs mysql
                exit 1
              fi
              echo "MySQL connection was not stable yet. Retrying migrations in 5 seconds..."
              sleep 5
            done

            echo "Building images and restarting containers if needed..."
            docker compose --profile local build
            docker compose --profile local up -d --remove-orphans
            docker compose --profile local ps

            echo "Waiting for api-gateway health..."
            for i in $(seq 1 60); do
              if curl -fsS http://localhost:3000/api/health; then
                echo
                exit 0
              fi
              if [ "${i}" -eq 60 ]; then
                echo "api-gateway did not become healthy in time."
                docker compose --profile local logs api-gateway
                exit 1
              fi
              sleep 2
            done
